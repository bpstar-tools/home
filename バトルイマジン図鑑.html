<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>スタレゾ バトルイマジン図鑑（日英中）</title>
<style>
:root{--bg:#2a363c;--panel:#1b262b;--panel2:#26323a;--line:#3c4c54;--text:#eaeff0;--muted:#9aa8ac;--accent:#d4af5a;--accent2:#58c6cd;--gold:#e3c06a;--purple:#bd96e6;--head:#eef1ee;--val:#92d24f;}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","Segoe UI",system-ui,sans-serif;background:#27343a;background-image:radial-gradient(900px 520px at 50% -40px,rgba(150,180,182,.14),transparent 65%),linear-gradient(180deg,#33424a 0%,#243034 100%);background-attachment:fixed;color:var(--text);-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:20;background:rgba(24,32,36,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(212,175,90,.22);padding:14px 22px}
.htop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.brand .mark{width:9px;height:22px;background:linear-gradient(180deg,var(--gold),#9c7a2e);border-radius:2px}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:21px;margin:0;font-weight:700;letter-spacing:.06em}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase}
.subnote{margin-top:9px;font-size:11.5px;color:var(--muted);line-height:1.6}
.subnote a{color:var(--accent2);text-decoration:none;border-bottom:1px dotted #3f6066}
.subnote a:hover{color:#7fd6dc}
.langs{margin-left:auto;display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.langs button{background:transparent;color:var(--muted);border:none;border-left:1px solid var(--line);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:background .12s,color .12s}
.langs button:first-child{border-left:none}
.langs button.on{background:var(--accent);color:#1a1305}
.langs button:not(.on):hover{color:var(--text);background:var(--panel2)}
.seasons{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-left:14px;vertical-align:middle}
.seasons button{background:transparent;color:var(--muted);border:none;border-left:1px solid var(--line);padding:7px 14px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.04em}
.seasons button:first-child{border-left:none}
.seasons button.on{background:var(--accent2);color:#06121f}
.seasons button:not(.on):hover{color:var(--text);background:var(--panel2)}

.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:13px;align-items:center}
.qbox{position:relative;width:240px;max-width:100%}
.qbox::before{content:"";position:absolute;left:11px;top:50%;width:13px;height:13px;margin-top:-7px;border:1.6px solid var(--muted);border-radius:50%;pointer-events:none}
.qbox::after{content:"";position:absolute;left:21px;top:50%;width:6px;height:1.6px;margin-top:4px;background:var(--muted);transform:rotate(45deg);transform-origin:left;pointer-events:none}
input#q{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 12px 9px 30px;font-size:14px}
input#q:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(201,162,75,.16)}
select{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px}
select:focus{outline:none;border-color:var(--accent)}
.count{font-size:12px;color:var(--muted);margin-top:9px;letter-spacing:.04em}
.wrap{max-width:none;margin:0 auto;padding:18px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:linear-gradient(180deg,#222e33,#19242a);border:1px solid var(--line);border-radius:10px;padding:15px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;transition:transform .12s ease,border-color .12s,box-shadow .12s}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 22px rgba(0,0,0,.4)}
.card.gold{border-color:#4d401f} .card.purple{border-color:#43355a}
.card.gold:hover{border-color:var(--gold)} .card.purple:hover{border-color:var(--purple)}
.ic{width:84px;height:84px;border-radius:12px;background:var(--panel2);object-fit:cover;border:2px solid var(--line);padding:3px}
.card.gold .ic{background:linear-gradient(135deg,#6b5320,#e0b658);border-color:#f0c860;box-shadow:0 0 10px rgba(240,200,96,.35)}
.card.purple .ic{background:linear-gradient(135deg,#42305f,#9a6bd0);border-color:#b98bea;box-shadow:0 0 10px rgba(185,139,234,.35)}
.nm{font-size:15px;font-weight:700;line-height:1.3}
.sub{font-size:11px;color:var(--muted)}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.b{font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--line);color:var(--muted)}
.b.gold{color:var(--gold);border-color:#5a4a1f;background:#2a2412}
.b.purple{color:var(--purple);border-color:#4a3a5f;background:#241a33}
.b.season{color:var(--accent2);border-color:#2f5258;background:#16282b}
.empty-state{text-align:center;color:var(--muted);padding:60px}
footer{max-width:none;margin:0 auto;padding:26px 22px 48px;border-top:1px solid var(--line);color:var(--muted)}
footer .rh{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
footer ul{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:4px 22px}
footer li{font-size:11.5px;line-height:1.9}
footer a{color:#9fb0c4;text-decoration:none;border-bottom:1px dotted #3a4658}
footer a:hover{color:var(--accent)}
footer .note{font-size:10.5px;color:#5f6b7c;margin-top:14px;line-height:1.7}

.overlay{position:fixed;inset:0;background:rgba(6,12,20,.7);backdrop-filter:blur(3px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto}
.overlay.show{display:flex}
.modal{background:#16212f;border:1px solid var(--line);border-radius:14px;max-width:620px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mhead{display:flex;gap:14px;align-items:center;padding:16px 18px;background:linear-gradient(180deg,#26343a,#1b272c);position:relative}
.mhead .ic{width:72px;height:72px}
.mtitle{font-size:20px;font-weight:800;color:#7fd6dc;text-shadow:0 0 12px rgba(88,198,205,.25)}
.msub{font-size:12px;color:var(--muted);margin-top:3px}
.mskill{margin-top:4px;font-size:13.5px;font-weight:700;color:var(--gold);letter-spacing:.02em}
.mclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.mbody{padding:14px 18px 20px}
.mbadges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.mlangs{display:inline-flex;gap:4px}
.mlangs button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:14px;padding:3px 11px;cursor:pointer;font-size:12px;font-weight:700}
.mseasons{display:inline-flex;gap:4px;margin-left:6px}
.mseasons button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:14px;padding:3px 11px;cursor:pointer;font-size:12px;font-weight:700}
.mseasons button.on{background:var(--accent2);color:#06121f;border-color:var(--accent2)}
.mseasons button[disabled]{opacity:.35;cursor:not-allowed}
.mlangs button.on{background:var(--accent);color:#06121f;border-color:var(--accent)}
.tierwrap{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.tierwrap select{font-size:14px;font-weight:700;color:var(--text)}

.sec-b{font-size:14px;line-height:1.7;white-space:pre-wrap;color:#dfeaf5}
.val{color:var(--val);font-weight:700}
@media(max-width:520px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}

 if(vals){

    if(allRanks){

 }

 });
 return html;

   <div class="sec-h">${u.passive}</div><div class="sec-b">${applyTier(_passiveText,curTier,_vals,_allRanks)}</div>
  </div>`;
 const sel=document.getElementById('tierSel');if(sel)sel.onchange=e=>{curTier=+e.target.value;renderDetail();};
