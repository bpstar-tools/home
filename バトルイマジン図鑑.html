<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>スタレゾ バトルイマジン図鑑（日英中）</title>
<style>
:root{--bg:#2a363c;--panel:#1b262b;--panel2:#26323a;--line:#3c4c54;--text:#eaeff0;--muted:#9aa8ac;--accent:#d4af5a;--accent2:#58c6cd;--gold:#e3c06a;--purple:#bd96e6;--head:#eef1ee;--val:#92d24f;}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo","Segoe UI",system-ui,sans-serif;background:#27343a;background-image:radial-gradient(900px 520px at 50% -40px,rgba(150,180,182,.14),transparent 65%),linear-gradient(180deg,#33424a 0%,#243034 100%);background-attachment:fixed;color:var(--text);-webkit-font-smoothing:antialiased}
header{position:sticky;top:0;z-index:20;background:rgba(24,32,36,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(212,175,90,.22);padding:14px 22px}
.htop{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:10px}
.brand .mark{width:9px;height:22px;background:linear-gradient(180deg,var(--gold),#9c7a2e);border-radius:2px}
h1{font-family:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;font-size:21px;margin:0;font-weight:700;letter-spacing:.06em}
.brand .en{font-size:11px;color:var(--muted);letter-spacing:.22em;text-transform:uppercase}
.subnote{margin-top:9px;font-size:11.5px;color:var(--muted);line-height:1.6}
.subnote a{color:var(--accent2);text-decoration:none;border-bottom:1px dotted #3f6066}
.subnote a:hover{color:#7fd6dc}
.langs{margin-left:auto;display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.langs button{background:transparent;color:var(--muted);border:none;border-left:1px solid var(--line);padding:7px 16px;cursor:pointer;font-size:13px;font-weight:600;transition:background .12s,color .12s}
.langs button:first-child{border-left:none}
.langs button.on{background:var(--accent);color:#1a1305}
.langs button:not(.on):hover{color:var(--text);background:var(--panel2)}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:13px;align-items:center}
.qbox{position:relative;width:240px;max-width:100%}
.qbox::before{content:"";position:absolute;left:11px;top:50%;width:13px;height:13px;margin-top:-7px;border:1.6px solid var(--muted);border-radius:50%;pointer-events:none}
.qbox::after{content:"";position:absolute;left:21px;top:50%;width:6px;height:1.6px;margin-top:4px;background:var(--muted);transform:rotate(45deg);transform-origin:left;pointer-events:none}
input#q{width:100%;background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 12px 9px 30px;font-size:14px}
input#q:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px rgba(201,162,75,.16)}
select{background:var(--panel);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 10px;font-size:13px}
select:focus{outline:none;border-color:var(--accent)}
.count{font-size:12px;color:var(--muted);margin-top:9px;letter-spacing:.04em}
.wrap{max-width:1280px;margin:0 auto;padding:18px 20px 60px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.card{background:linear-gradient(180deg,#222e33,#19242a);border:1px solid var(--line);border-radius:10px;padding:15px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;cursor:pointer;transition:transform .12s ease,border-color .12s,box-shadow .12s}
.card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 8px 22px rgba(0,0,0,.4)}
.card.gold{border-color:#4d401f} .card.purple{border-color:#43355a}
.card.gold:hover{border-color:var(--gold)} .card.purple:hover{border-color:var(--purple)}
.ic{width:84px;height:84px;border-radius:12px;background:var(--panel2);object-fit:cover;border:2px solid var(--line);padding:3px}
.card.gold .ic{background:linear-gradient(135deg,#6b5320,#e0b658);border-color:#f0c860;box-shadow:0 0 10px rgba(240,200,96,.35)}
.card.purple .ic{background:linear-gradient(135deg,#42305f,#9a6bd0);border-color:#b98bea;box-shadow:0 0 10px rgba(185,139,234,.35)}
.nm{font-size:15px;font-weight:700;line-height:1.3}
.sub{font-size:11px;color:var(--muted)}
.badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.b{font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--line);color:var(--muted)}
.b.gold{color:var(--gold);border-color:#5a4a1f;background:#2a2412}
.b.purple{color:var(--purple);border-color:#4a3a5f;background:#241a33}
.b.season{color:var(--accent2);border-color:#2f5258;background:#16282b}
.empty-state{text-align:center;color:var(--muted);padding:60px}
footer{max-width:1280px;margin:0 auto;padding:26px 22px 48px;border-top:1px solid var(--line);color:var(--muted)}
footer .rh{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}
footer ul{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:4px 22px}
footer li{font-size:11.5px;line-height:1.9}
footer a{color:#9fb0c4;text-decoration:none;border-bottom:1px dotted #3a4658}
footer a:hover{color:var(--accent)}
footer .note{font-size:10.5px;color:#5f6b7c;margin-top:14px;line-height:1.7}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(6,12,20,.7);backdrop-filter:blur(3px);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:30px 14px;overflow:auto}
.overlay.show{display:flex}
.modal{background:#16212f;border:1px solid var(--line);border-radius:14px;max-width:620px;width:100%;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.mhead{display:flex;gap:14px;align-items:center;padding:16px 18px;background:linear-gradient(180deg,#26343a,#1b272c);position:relative}
.mhead .ic{width:72px;height:72px}
.mtitle{font-size:20px;font-weight:800;color:#7fd6dc;text-shadow:0 0 12px rgba(88,198,205,.25)}
.msub{font-size:12px;color:var(--muted);margin-top:3px}
.mclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1}
.mbody{padding:14px 18px 20px}
.mbadges{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.mlangs{display:inline-flex;gap:4px}
.mlangs button{background:var(--panel2);color:var(--muted);border:1px solid var(--line);border-radius:14px;padding:3px 11px;cursor:pointer;font-size:12px;font-weight:700}
.mlangs button.on{background:var(--accent);color:#06121f;border-color:var(--accent)}
.tierwrap{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.tierwrap select{font-size:14px;font-weight:700;color:var(--text)}
.sec-h{color:var(--head);font-weight:700;font-size:15px;border-bottom:1px solid var(--line);padding:0 0 6px 10px;margin:16px 0 10px;border-left:3px solid var(--accent)}
.sec-b{font-size:14px;line-height:1.7;white-space:pre-wrap;color:#dfeaf5}
.val{color:var(--val);font-weight:700}
@media(max-width:520px){.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
</style></head><body>
<header><div class="htop">
  <div class="brand"><span class="mark"></span><h1 id="t_title">バトルイマジン図鑑</h1></div>
  <div class="langs"><button data-l="ja" class="on">日本語</button><button data-l="en">English</button><button data-l="zh">中文</button></div>
</div>
<div class="subnote" id="subnote"></div>
<div class="controls"><span class="qbox"><input id="q" placeholder="検索…"></span><select id="frar"></select><select id="fsea"></select></div>
<div class="count" id="count"></div></header>
<div class="wrap"><div class="grid" id="grid"></div><div id="none" class="empty-state" style="display:none"></div></div>
<footer id="refs"></footer>
<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>
<script>
const DB={"generated":"BPSR Battle Imagine (正解=ユーザー提供 / アイコン=maxroll)","imagines":[{"ja":"タータ","en":"Tatta","zh":"塔塔","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_042.webp","quality":5,"aoyiSkillId":"3911","activeJa":"タータを召喚し、パーティ全員に戦意を付与し、一定時間撃破されず、HPが一定割合を下回らない。疲労:60秒間は同じ効果を受けられない(疲労効果はナイトメア難易度のパーティダンジョンでは強化される)。\n・最小HP:[1/2.8/4.6/6.4/8.2/10]%\n・持続時間:[3/3.9/4.8/5.7/6.6/7.5]秒\n・リキャスト:[150/150/150/125/125/100]秒","activeEn":"Arcane! Heart of Flame\nSummons Tatta to grant Battle Will to the entire team, preventing all allies from being defeated and ensuring their HP does not fall below a certain threshold for a period of time. \nExhausted: Cannot be affected by the same type of effect within 60s (Exhausted effects are enhanced in party dungeons of Nightmare mode).\n【0-5凸 Values】\n・Min HP:[1/2.8/4.6/6.4/8.2/10]%\n・Duration:[3/3.9/4.8/5.7/6.6/7.5]s\n・CD:[150/150/150/125/125/100]s","activeZh":"奥义！烈焰之心\n召唤塔塔，对全队施加战意，一定时间内不会被击败，且生命值不低于一定比例。\n力竭:60秒内无法受到同类型效果影响（力竭效果在噩梦难度团队副本中会被放大）\n【0-5凸 数值】\n・最小生命:[1/2.8/4.6/6.4/8.2/10]%\n・持续时间:[3/3.9/4.8/5.7/6.6/7.5]秒\n・冷却:[150/150/150/125/125/100]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"アルーナ","en":"Airona","zh":"艾露娜","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_013.webp","quality":5,"aoyiSkillId":"3920","activeJa":"アルーナを召喚し、短い詠唱後、周囲のパーティメンバー最大4名を復活させる。虚弱:60秒間は同じ効果を受けられない(虚弱効果はナイトメア難易度のパーティダンジョンで強化される)。\n・メンバー復活後の基本HP:[10/20/30/30/40/50]%\n・リキャスト:[150/150/150/125/125/100]秒","activeEn":"Arcane! Blessing of Life\nSummons Airona. After a brief cast, revives up to 4 nearby teammates. Weakness: Cannot be affected by the same type of effect within 60s (Weakness effects are enhanced in party dungeons of Nightmare mode).\n【0-5凸 Values】\n・Revived base HP:[10/20/30/30/40/50]%\n・CD:[150/150/150/125/125/100]s","activeZh":"奥义！生命祈愿\n召唤艾露娜，短暂吟唱后，复活周围的队友，最多4名。\n虚弱:60秒内无法受到同类型效果影响（虚弱效果在噩梦难度团队副本中会被放大）\n【0-5凸 数值】\n・复活后基础生命:[10/20/30/30/40/50]%\n・冷却:[150/150/150/125/125/100]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"ティナ","en":"Tina","zh":"蒂娜","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_016.webp","quality":5,"aoyiSkillId":"3921","activeJa":"ティナを召喚し、自身と周囲の味方最大10名(パーティメンバー優先)のスキルリキャスト速度を一定時間アップする。【60秒間は同じ効果を受けられない】\n・リキャスト速度アップ:[50/60/70/80/90/100]%\n・持続時間:20秒\n・リキャスト:[150/150/150/125/125/100]秒","activeEn":"Arcane! Time Decree\nSummons Tina to channel the power of time, reducing the Skill CDs of yourself and up to 10 surrounding allies for a certain period. \n(Cannot be affected by the same type of effect within 60s.)\n【0-5凸 Values】\n・CD Speed Up:[50/60/70/80/90/100]%\n・Duration:20s\n・CD:[150/150/150/125/125/100]s","activeZh":"奥义！时间法令\n召唤蒂娜，以时光之力灌注，使自己和周围至多10名友方目标（优先队友）一段时间内技能冷却速度提升。\n【60秒内无法受到同类型效果影响】\n【0-5凸 数值】\n・冷却速度提升:[50/60/70/80/90/100]%\n・持续时间:20秒\n・冷却:[150/150/150/125/125/100]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"オルヴェラ","en":"Olvera","zh":"奥尔维拉","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_025.webp","quality":5,"aoyiSkillId":"3922","activeJa":"オルヴェラを召喚し、現在地と前方を往復しルート上のエネミーを集めて物理ダメージを与え、対象を中断する。ダメージを与えると一定確率で対象に10秒持続するサンダーシードを付与する。サンダーシードを持つ対象にダメージを与えると魔法ダメージを与える(リキャスト2秒)。サンダーシードを持つ対象が倒されるとリキャスト-20秒。\n・合計ダメージ:[612/703.5/795.6/887.4/979.2/1071]%物理/魔法攻撃力+58(ブレイク値:51)\n・1回の炸裂ダメージ:[105/120.7/136.5/152.2/168/183.7]%物理/魔法攻撃力+10(ブレイク値:8)\n・確率:[40/52/64/76/88/100]%\n・リキャスト:[120/120/120/100/100/80]秒","activeEn":"Arcane! Flash Execution\nSummons Olvera to shuttle back and forth in a forward direction, drawing in enemies encountered along the path, dealing Attack DMG, and interrupting their actions. When dealing DMG, there is a chance to inflict Seed of Lightning on the targets for 10s. Dealing DMG to targets with Seed of Lightning will cause an explosion (CD: 2s), dealing Magic DMG. Any target with Seed of Lightning defeated will reduce CD time by 20s.\n【0-5凸 Values】\n・Total DMG:[612/703.5/795.6/887.4/979.2/1071]%Phys/Magic ATK+58(Break:51)\n・1 per burst DMG:[105/120.7/136.5/152.2/168/183.7]%Phys/Magic ATK+10(Break:8)\n・Chance:[40/52/64/76/88/100]%\n・CD:[120/120/120/100/100/80]s","activeZh":"奥义！瞬即斩\n召唤奥尔维拉，向前方来回穿梭，聚集路径上的敌人，并造成物理伤害并打断目标。造成伤害时有一定概率给目标施加雷电之种，持续10秒。对拥有雷电之种的目标造成伤害时会使其爆炸（冷却时间2秒），造成魔法伤害。任何拥有雷电之种的目标被击败，都会减少20秒冷却时间。\n【0-5凸 数值】\n・合计伤害:[612/703.5/795.6/887.4/979.2/1071]%物理/魔法攻击力+58(韧性值:51)\n・1次爆裂伤害:[105/120.7/136.5/152.2/168/183.7]%物理/魔法攻击力+10(韧性值:8)\n・概率:[40/52/64/76/88/100]%\n・冷却:[120/120/120/100/100/80]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"ロローラ","en":"Rorola","zh":"罗罗拉","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S2","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_052.webp","quality":5,"aoyiSkillId":"3948","activeJa":"ロローラを召喚し攻撃を行う。攻撃が命中した対象に与える自身のダメージが一定時間アップする。対象に10回ダメージを与えるごとにダメージが追加でアップし最大5回まで。上限後は追加ダメージ効果の持続時間が延長される(基礎ダメージアップの持続時間は延長されない)。持続は1回につき3秒延長、最大5回まで。ライフドレインを獲得し対象に与えたダメージの一定割合を回復する(効果時間延長対象)。スキルは2回までチャージ可能。\n・合計ダメージ:[1500/1724.6/1950/2174.9/2400/2624.9]%物理/魔法攻撃力+149(ブレイク値:100)\n・ダメージアップ:[10/12/14/16/18/20]%\n・ダメージ追加アップ:[1.2/1.44/1.68/1.92/2.16/2.4]%\n・HP吸収割合:1%\n・持続時間:20秒\n・チャージ時間:[120/120/120/100/100/80]秒","activeEn":"Arcane! Divine Reliance\nSummons Rorola, resonating with the power of ancestors to gain a damage boost for some time. Also, every 10 hits on targets grant an additional damage boost, stacking up to 5 times. Once the cap is reached, subsequent hits extend the duration of the additional boost (the duration of the Base DMG boost does not extend). Each extension adds 3s, with a maximum of 5 extensions. At the same time, grants the Life Steal effect, restoring HP equal to a portion of damage dealt (the duration can extend). \nThis skill holds 2 charges.\n【0-5凸 Values】\n・Total DMG:[1500/1724.6/1950/2174.9/2400/2624.9]%Phys/Magic ATK+149(Break:100)\n・DMG Up:[10/12/14/16/18/20]%\n・Extra DMG Up:[1.2/1.44/1.68/1.92/2.16/2.4]%\n・HP Steal Ratio:1%\n・Duration:20s\n・Charge Time:[120/120/120/100/100/80]s","activeZh":"奥义！神灵依凭\n召唤罗罗拉，共鸣先祖之力协同攻击，一段时间内使自身对命中目标造成的伤害提高，对目标每造成10次伤害会获得额外提升，最多可额外提升5次，到达上限后，转为延续额外伤害的持续时间（基础伤害提升的时间不会被延续），每次延续3秒，最多可额外延续5次。同时自身获得生命吸取：可回复一定比例对目标造成的伤害（时间会被延续）。\n技能可充能2次。\n【0-5凸 数值】\n・合计伤害:[1500/1724.6/1950/2174.9/2400/2624.9]%物理/魔法攻击力+149(韧性值:100)\n・伤害提升:[10/12/14/16/18/20]%\n・伤害追加提升:[1.2/1.44/1.68/1.92/2.16/2.4]%\n・生命吸收比例:1%\n・持续时间:20秒\n・充能时间:[120/120/120/100/100/80]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"ドロシー","en":"Dorothy","zh":"陶洛斯","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S2","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_053.webp","quality":5,"aoyiSkillId":"3949","activeJa":"ドロシーに変身し、攻撃スキルが切り替わる。同時に工匠の力を獲得する。変身リキャスト:20秒。\nパッシブ:ダメージを与えた時40%の確率で稲妻チェーンを発動(0.5秒ごとに1回まで／1000%物理魔法攻撃力+50)。\n①チャージして強力な一撃(物理)。チャージ1段ごとに+150%。チャージ射撃1段:[1000/1200/1400/1600/1800/2000]%+50、CD10秒\n②サンダーボム:[1280/1536/1792/2048/2304/2560]%+64、サンダーストームエリア1回:[384/460.8/537.6/614.4/691.2/768]%+19、CD15秒\n③追尾雷弾:[267/320.4/373.8/427.2/480.6/534]%+13、CD25秒\n④スローターボム(究極):[5000/6000/7000/8000/9000/10000]%+250、CD45秒\n通常攻撃1段:[400/480/560/640/720/800]%+20、2段3段:[800/960/1120/1280/1440/1600]%+40","activeEn":"Arcane! Illusion Resonance\nTransforms into Dorothy, replacing basic attack modules and gaining Artisan's Power. \nPassive: Dealing damage has a 40% chance to trigger Chain Lightning (trigger interval: at least 0.5s).\n① Charges and fires a powerful shot at the target, dealing Attack DMG. Each additional charge increases the damage by 150%.\n② Leaps into the air and launches a Thunderstorm Bolt at the target, dealing Attack DMG and creating a Thunderstorm Zone at the target for 7s. Thunderstorm Zone deals Attack DMG per second to enemies within and slows them. \n③ Continuously unleashes Thunder Tracers, dealing Attack DMG and inflicting Paralysis on hit. \n④ Fires an Oblivion Bomb, which explodes after traveling a distance or upon impact, dealing Attack DMG.","activeZh":"奥义！幻象共鸣\n变身为陶洛斯，替换全新的普通攻击模组的同时，获得工匠之力。\n被动：造成伤害时有40%概率触发闪电链（每0.5秒至多触发一次）\n①蓄力朝目标射出威力强大的一枪，造成物理伤害，每额外蓄力一段，造成的伤害提高150%\n②跃至空中后朝目标发射一颗雷暴弹，造成物理伤害，并在目标处产生「雷暴区域」，持续7秒，雷暴区域每秒对范围内的敌方单位造成物理伤害，并施加减速效果。\n③持续不间断的施放追踪雷弹，追踪雷弹命中后造成物理伤害，并施加麻痹效果。\n④发射一颗溟灭弹，溟灭弹在飞行一段距离或者碰撞后会爆炸造成物理伤害","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"ボイス","en":"Boyce","zh":"博伊斯","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S2","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_055.webp","quality":5,"aoyiSkillId":"3950","activeJa":"召喚したボイスがフロストパワーを集めてフロストエリアを生成し、氷属性魔法ダメージを与える。スキル発動後の一定時間、自身の攻撃力がアップ。かつ、特殊攻撃を発動するたび追加アップする(5スタックまで)。スタック上限に達すると攻撃速度と詠唱速度ボーナスを獲得(特殊攻撃を発動し続ければ毎回3秒延長、追加延長は5回まで)。スキルは2回までチャージ可。\n・合計ダメージ:[1050/1207.4/1365/1522.5/1680/1837.5]%物理/魔法攻撃力+105(ブレイク値:100)\n・攻撃力アップ:[8/9.6/11.2/12.8/14.4/16]%\n・攻撃力追加アップ:[1/1.2/1.4/1.6/1.8/2]%\n・攻撃速度アップ:[5/6/7/8/9/10]%\n・詠唱速度アップ:[10/12/14/16/18/20]%\n・持続時間:20秒\n・チャージ時間:[120/120/120/100/100/80]秒","activeEn":"Arcane! Allscape Sublimation\nSummons Boyce to create a field of frost by concentrating ice power, dealing Ice Magic DMG. \nAfter casting, your ATK is increased for a period of time. Each cast of a Special Attack grants an additional increase, stacking up to 5 times. At max stacks, gain a bonus to Attack SPD and Casting SPD. Performing a Special Attack extends this bonus's duration by 3s, up to a max of 5 times (The ATK bonus's duration is not affected). \nThis skill holds 2 charges.\n【0-5凸 Values】\n・Total DMG:[1050/1207.4/1365/1522.5/1680/1837.5]%Phys/Magic ATK+105(Break:100)\n・ATK Up:[8/9.6/11.2/12.8/14.4/16]%\n・Extra ATK Up:[1/1.2/1.4/1.6/1.8/2]%\n・Attack SPD Up:[5/6/7/8/9/10]%\n・Cast SPD Up:[10/12/14/16/18/20]%\n・Duration:20s\n・Charge Time:[120/120/120/100/100/80]s","activeZh":"奥义！万象升华\n召唤博伊斯，凝聚冰霜之力制造冰霜区域，造成冰元素魔法伤害。\n技能释放后，一段时间内你的攻击力获得提升，每次施放特殊攻击时获得额外提升，最高可叠加5层。达到满层时获得攻击速度和施法速度加成，继续施放特殊攻击可延续此加成的持续时间，每次延续3秒，最多可额外延续5次（攻击力加成的持续时间不会被延续）。\n技能可充能2次。\n【0-5凸 数值】\n・合计伤害:[1050/1207.4/1365/1522.5/1680/1837.5]%物理/魔法攻击力+105(韧性值:100)\n・攻击力提升:[8/9.6/11.2/12.8/14.4/16]%\n・攻击力追加提升:[1/1.2/1.4/1.6/1.8/2]%\n・攻击速度提升:[5/6/7/8/9/10]%\n・施法速度提升:[10/12/14/16/18/20]%\n・持续时间:20秒\n・充能时间:[120/120/120/100/100/80]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%","passiveEn":"Strength+[6/7.8/9.6/11.4/13.2/15]%\nIntellect+[6/7.8/9.6/11.4/13.2/15]%\nAgility+[6/7.8/9.6/11.4/13.2/15]%","passiveZh":"力量+[6/7.8/9.6/11.4/13.2/15]%\n智力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷+[6/7.8/9.6/11.4/13.2/15]%"},{"ja":"ファルファラ","en":"Fafala","zh":"法法菈","rarity":"金（NPC）","rarityKey":"gold_npc","season":"S2","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_054.webp","quality":5,"aoyiSkillId":"3951","activeJa":"ファルファラを召喚し領域を生成する。領域内の自身とパーティメンバーは最終ダメージ軽減と剛体を獲得。自身が領域内でダメージを与えると、防御力の割合ダメージを追加(1秒ごとに最大1回)。自身がダメージを受けると、このスキルのリキャスト-1秒(2秒ごとに最大1回)。【スタック不可、同じ効果は1つのみ有効】\n・最終ダメージ軽減:[15/18/21/24/27/30]%\n・追加物理防御力ダメージ:[200/240/280/320/360/400]%+シーズンレベル×1%\n・持続時間:15秒\n・リキャスト:[90/90/90/75/75/60]秒","activeEn":"Arcane! Guardian's Boundary\nSummons Fafala to create a field. \nYou and allies within the field gain Final DMG Reduction and Super Armor. When you deal damage from inside the field, inflict bonus damage based on a percentage of your DEF (can trigger at most once every 1s). When you take damage, reduce the CD of this Skill by 1s (can trigger at most once every 2s).\n[This effect does not stack. Only one instance of this effect can be active at a time.\n【0-5凸 Values】\n・Final DMG Reduction:[15/18/21/24/27/30]%\n・Additional DEF-based DMG:[200/240/280/320/360/400]%+Season Level×1%\n・Duration:15s\n・CD:[90/90/90/75/75/60]s","activeZh":"奥义！佑世边界\n召唤法法菈，生成一个领域。\n处于领域内的自身和队友获得最终伤害减免和霸体。当自身处于领域内造成伤害时，额外附加一个防御力百分比伤害（每1秒至多触发1次），当你受到伤害时减少1秒当前共鸣技能冷却时间（每2秒至多触发1次）\n【不可叠加，同效果仅生效一个】\n【0-5凸 数值】\n・最终伤害减免:[15/18/21/24/27/30]%\n・额外物理防御力伤害:[200/240/280/320/360/400]%+赛季等级×1%\n・持续时间:15秒\n・冷却:[90/90/90/75/75/60]秒","passiveJa":"筋力+[6/7.8/9.6/11.4/13.2/15]%\n知力+[6/7.8/9.6/11.4/13.2/15]%\n敏捷 ive blast of fire forward, dealing Fire Attack DMG. If at max Dragon Force stacks, consumes all stacks of Dragon Force to gain CD reduction for Natsu's skills and a Fire Bonus. This effect persists for the duration of the current transformation and can stack up to 3 times.\n【0-5凸 values】\n・Transform CD: 20s\n・Basic Attack 1: [250/300/350/400/450/500]% Phys/Magic ATK +12\n・Basic Attack 2: [300/360/420/480/540/600]% Phys/Magic ATK +15\n・Basic Attack 3: [450/540/630/720/810/900]% Phys/Magic ATK +22\n・Fire Dragon's Iron Fist: [1400/1680/1960/2240/2520/2800]% Phys/Magic ATK +70, CD 5s\n・Fire Dragon's Wing Attack: [4000/4800/5600/6400/7200/8000]% Phys/Magic ATK +200, CD 15s\n・Fire Dragon's Roar: [4499/4948.9/5398.8/6748.4/7198.4/7648.3]% Phys/Magic ATK +220, CD reduction 25%, Fire Bonus [56.2/56.2/56.2/73/73/89.9]%, CD 20s","activeZh":"奥义！灭龙魔导士\n变身为火之灭龙魔导士·纳兹，替换全新的技能模组的同时，获得能力转化。\n被动：释放除终极技能以外技能时，根据技能类型获得对应层数龙焰，每获得10层龙焰将自动转化成1层龙之力，龙之力至多可以叠加5层。每层龙之力使你获得火元素加成。\n①火龙的铁拳：短暂蓄力朝前方打出炙热一拳，造成火元素物理伤害，积攒5层龙焰。\n②火龙的翼击：猛然跃起交向前方突进，造成火元素物理伤害，积攒5层龙焰。\n③火龙的咆哮：聚集火焰的力量，向面朝方向喷出巨大火焰，造成火元素物理伤害。若此时拥有满层龙之力，则消耗龙之力所有层数获得纳兹技能冷却缩减和火元素加成，该效果本次变身内不会消除且最多可以叠加3次。\n【0-5凸 数值】\n・变身冷却：20秒\n・普通攻击1段：[250/300/350/400/450/500]%物理/魔法攻击力+12\n・普通攻击2段：[300/360/420/480/540/600]%物理/魔法攻击力+15\n・普通攻击3段：[450/540/630/720/810/900]%物理/魔法攻击力+22\n・火龙的铁拳：[1400/1680/1960/2240/2520/2800]%物理/魔法攻击力+70，冷却5秒\n・火龙的翼击：[4000/4800/5600/6400/7200/8000]%物理/魔法攻击力+200，冷却15秒\n・火龙的咆哮：[4499/4948.9/5398.8/6748.4/7198.4/7648.3]%物理/魔法攻击力+220，冷却缩减25%，属性加成[56.2/56.2/56.2/73/73/89.9]%，冷却20秒","passiveJa":"物理攻撃力+[7.2/9.36/11.52/13.68/15.84/18]%\n魔法攻撃力+[7.2/9.36/11.52/13.68/15.84/18]%","passiveEn":"ATK+[7.2/9.36/11.52/13.68/15.84/18]%\nMATK+[7.2/9.36/11.52/13.68/15.84/18]%","passiveZh":"物理攻击+[7.2/9.36/11.52/13.68/15.84/18]%\n魔法攻击+[7.2/9.36/11.52/13.68/15.84/18]%"},{"ja":"フレイムオーガ","en":"Inferno Ogre","zh":"火焰食人魔","rarity":"金","rarityKey":"gold","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_017.webp","quality":5,"aoyiSkillId":"3901","activeJa":"ボス・フレイムオーガに変身し、前方に火炎を放って対象に物理ダメージを与え、対象を中断する。自身のHPを回復し、超過分は20秒間持続するバリアに変換される。変身中は受けるダメージ-50%。\n・合計ダメージ:[1197/1376.2/1556.1/1735.3/1915.2/2094.4]%物理/魔法攻撃力+119(ブレイク値:77)\n・合計回復:物理・魔法攻撃力[749/805.14/861.28/1029.84/1086.05/1142.19]%+70\n・リキャスト:[120/120/120/100/100/80]秒","activeEn":"Arcane! Flame Roar\nTransforms into Boss: Inferno Ogre to unleash a forward fiery breath that deals Attack DMG and interrupts affected targets. Concurrently, applies Healing to you, and 100% excess healing is converted into a Shield lasting 20s. The transformed form reduces DMG taken by 50%.\n【0-5凸 Values】\n・Total DMG:[1197/1376.2/1556.1/1735.3/1915.2/2094.4]%Phys/Magic ATK+119(Break:77)\n・Total Healing:Phys/Magic ATK[749/805.14/861.28/1029.84/1086.05/1142.19]%+70\n・CD:[120/120/120/100/100/80]s","activeZh":"奥义！琉火咆哮\n变身为首领·火焰食人魔，朝前方喷吐火焰，对目标造成物理伤害并打断目标，同时自身获得治疗，过量治疗100%转化成持续20秒的护盾。变身期间受到伤害降低50%。\n【0-5凸 数值】\n・合计伤害:[1197/1376.2/1556.1/1735.3/1915.2/2094.4]%物理/魔法攻击力+119(韧性值:77)\n・合计治疗:物理/魔法攻击力[749/805.14/861.28/1029.84/1086.05/1142.19]%+70\n・冷却:[120/120/120/100/100/80]秒","passiveJa":"被回復力+[8/10.4/12.8/15.2/17.6/20]%\n耐久力+[5/6.5/8/9.5/11/12.5]%","passiveEn":"Healing Received+[8/10.4/12.8/15.2/17.6/20]\nEndurance+[5/6.5/8/9.5/11/12.5]%","passiveZh":"受治疗强度+[8/10.4/12.8/15.2/17.6/20]\n耐力+[5/6.5/8/9.5/11/12.5]%"},{"ja":"サンダーオーガ","en":"Tempest Ogre","zh":"雷电食人魔","rarity":"金","rarityKey":"gold","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_014.webp","quality":5,"aoyiSkillId":"3902","activeJa":"ボス・サンダーオーガを召喚し、近くのエネミーを持続的に引き寄せる。効果が終了すると範囲魔法ダメージを与える。\n・合計ダメージ:[1050/1207.4/1365/1522.5/1680/1837.5]%物理/魔法攻撃力+105(ブレイク値:100)\n・リキャスト:[120/120/120/100/100/80]秒","activeEn":"Arcane! Thunderfall Grasp\nSummons Boss: Tempest Ogre and channels the power of thunder to generate a vortex, continuously pulling in enemies near the target and dealing AoE Magic DMG when the duration ends.\n【0-5凸 Values】\n・Total DMG:[1050/1207.4/1365/1522.5/1680/1837.5]%Phys/Magic ATK+105(Break:100)\n・CD:[120/120/120/100/100/80]s","activeZh":"奥义！雷霆天引\n召唤首领·雷电食人魔，引雷霆之力，召唤雷霆旋涡，持续吸引目标附近的敌人，持续时间结束后，造成范围魔法伤害。\n【0-5凸 数值】\n・合计伤害:[1050/1207.4/1365/1522.5/1680/1837.5]%物理/魔法攻击力+105(韧性值:100)\n・冷却:[120/120/120/100/100/80]秒","passiveJa":"10秒ごとに付近のランダムな対象に雷を落とし、攻撃力の[37.3/48.49/59.68/70.87/82.06/93.25]%の雷属性物理ダメージを与える。ダメージを受けると落雷の発動インターバルが0.5秒短縮。落雷発生ごとにアクティブ効果のリキャストを0.5秒短縮、落雷が命中した敵から受けるダメージが3秒間-[5/5/5/8/8/10]%。","passiveEn":"Every 10s, unleashes a lightning strike on a random nearby target, dealing Thunder Attack DMG equal to [37.3/48.49/59.68/70.87/82.06/93.25]% ATK. Taking DMG reduces the lightning trigger interval by 0.5s. Each trigger reduces the CD of this skill by 0.5s, and targets hit deal [5/5/5/8/8/10]% less DMG to you for 3s.","passiveZh":"每过10秒对附近随机目标释放落雷，造成[37.3/48.49/59.68/70.87/82.06/93.25]%攻击力雷元素物理伤害，受到伤害时减少0.5秒落雷的触发间隔，每次触发减少当前共鸣技能的主动效果0.5秒冷却时间，被击中的目标对你造成的伤害3秒内减少[5/5/5/8/8/10]%"},{"ja":"異国の山賊長ヒグマ","en":"Brigand Leader","zh":"山贼头目","rarity":"金","rarityKey":"gold","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_018.webp","quality":5,"aoyiSkillId":"3903","activeJa":"ボス・異国の山賊長ヒグマに変身し、烈炎の大斧を召喚する。一定時間、範囲内のパーティ全員の攻撃力がアップし、自身はさらに攻撃力がアップする。【スタック不可、同じ効果は1つのみ有効】\n・攻撃力アップ(自分):[15/18/21/24/27/30]%\n・攻撃力アップ(パーティ):[5/6/7/8/9/10]%\n・持続時間:15秒\n・リキャスト:[120/120/120/100/100/80]秒","activeEn":"Arcane! Blazing Axe\nTransforms into Boss: Brigand Leader and summons a blazing giant axe, increasing the party's ATK within range for a period and granting yourself additional ATK boost. \n(This effect cannot stack and only one can be active at a time.)\n【0-5凸 Values】\n・ATK Up(Self):[15/18/21/24/27/30]%\n・ATK Up(Party):[5/6/7/8/9/10]%\n・Duration:15s\n・CD:[120/120/120/100/100/80]s","activeZh":"奥义！炽炎战斧\n变身为首领·山贼头目，召唤烈焰巨斧，一段时间内提升范围内全队攻击力，自身获得额外攻击力提升。\n【不可叠加，同时释放仅生效一个】\n【0-5凸 数值】\n・攻击力提升(自身):[15/18/21/24/27/30]%\n・攻击力提升(队伍):[5/6/7/8/9/10]%\n・持续时间:15秒\n・冷却:[120/120/120/100/100/80]秒","passiveJa":"攻撃が幸運の一撃になると次の「幸運効果」を発動する。幸運効果:対象に燃焼効果を付与し、攻撃力の[29.1/37.83/46.56/55.29/64.02/72.75]%の火属性物理ダメージを与える。持続5秒。","passiveEn":"When a Lucky Strike is launched, the Lucky Effect may be activated: Applies a burn effect to the target, dealing Fire Attack DMG equal to [29.1/37.83/46.56/55.29/64.02/72.75]ATK for 5s.","passiveZh":"伤害触发幸运一击时可触发「幸运效果」：对目标施加灼烧效果，造成[29.1/37.83/46.56/55.29/64.02/72.75]攻击力火元素物理伤害，持续5秒"},{"ja":"フロストオーガ","en":"Frost Ogre","zh":"寒霜食人魔","rarity":"金","rarityKey":"gold","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_015.webp","quality":5,"aoyiSkillId":"3906","activeJa":"ボス・フロストオーガを召喚し、物理ダメージを与え、命中した対象を氷結させる。スキル発動後の一定時間、自身のブレイクボーナスがアップする。\n・合計ダメージ:[1500/1724/1950/2175/2400/2625]%物理/魔法攻撃力+150(ブレイク値:15000)\n・ブレイクボーナスアップ:[45/54/63/72/81/90]%\n・持続時間:20秒\n・リキャスト:[120/120/120/100/100/80]秒","activeEn":"Arcane! Frostquake\nSummons Boss: Frost Ogre to execute a spinning attack with an ice hammer, resulting in Attack DMG and freezing all targets on hit. \nUpon the skill cast, your Resilience Break Bonus is increased for a period.\n【0-5凸 Values】\n・Total DMG:[1500/1724/1950/2175/2400/2625]%Phys/Magic ATK+150(Break:15000)\n・Break Bonus Up:[45/54/63/72/81/90]%\n・Duration:20s\n・CD:[120/120/120/100/100/80]s","activeZh":"奥义！冰霜震荡\n召唤首领·寒霜食人魔，挥舞寒冰大锤旋转攻击敌人造成物理伤害，对命中到的目标造成冰冻效果。\n技能释放后，一段时间内你的破韧加成获得提升。\n【0-5凸 数值】\n・合计伤害:[1500/1724/1950/2175/2400/2625]%物理/魔法攻击力+150(韧性值:15000)\n・韧性奖励提升:[45/54/63/72/81/90]%\n・持续时间:20秒\n・冷却:[120/120/120/100/100/80]秒","passiveJa":"ブレイク効率+[20/26/32/38/44/50]%","passiveEn":"Resilience Break Efficiency+[20/26/32/38/44/50]","passiveZh":"破韧效率+[20/26/32/38/44/50]"},{"ja":"キングムーク","en":"Muku King","zh":"姆克王","rarity":"金","rarityKey":"gold","season":"S1","icon":"https://assets-ng.maxroll.gg/sr-tools/assets/db/icons/items/imagines/skill_aoyi_product_icon_012.webp","quality":5,"aoyiSkillId":"3908","activeJa":"ボス・キングムークを召喚し、最大10名の味方(パーティメンバー優先)を持続的に回復    <div class="badges"><span class="b ${rc}">${esc(rarLabel[lang][x.rarity]||x.rarity)}</span><span class="b season">${esc(x.season)}</span></div>
  </div>`}).join('');
 g.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(DB.imagines[+c.dataset.i]));}
function openDetail(x){curImg=x;document.getElementById('overlay').classList.add('show');renderDetail();}
function closeDetail(){document.getElementById('overlay').classList.remove('show');curImg=null;}
function renderDetail(){if(!curImg)return;const x=curImg;const u=UI[lang];const rc=rarClass(x);
 const tierOpts=[0,1,2,3,4,5].map(i=>`<option value="${i}" ${i==curTier?'selected':''}>${u.tierOpt(i)}</option>`).join('');
 document.getElementById('modal').innerHTML=`
  <div class="mhead">
   <img class="ic ${rc?'':''}" src="${x.icon}" onerror="this.style.visibility='hidden'" style="${rc=='gold'?'background:linear-gradient(135deg,#6b5320,#e0b658);border:2px solid #f0c860':'background:linear-gradient(135deg,#42305f,#9a6bd0);border:2px solid #b98bea'};border-radius:12px;padding:3px;object-fit:cover">
   <div><div class="mtitle">${esc(nm(x))}</div><div class="msub">${esc(sub(x))}</div></div>
   <button class="mclose" onclick="closeDetail()">×</button>
  </div>
  <div class="mbody">
   <div class="mbadges">
    <span class="b ${rc}">${esc(rarLabel[lang][x.rarity]||x.rarity)}</span>
    <span class="b season">${esc(x.season)}</span>
    <span class="mlangs">${['ja','en','zh'].map(l=>`<button data-ml="${l}" class="${l==lang?'on':''}">${l=='ja'?'日':l=='en'?'EN':'中'}</button>`).join('')}</span>
    <span class="tierwrap">${u.tier}: <select id="tierSel">${tierOpts}</select></span>
   </div>
   <div class="sec-h">${u.active}</div><div class="sec-b">${applyTier(activeT(x),curTier)}</div>
   <div class="sec-h">${u.passive}</div><div class="sec-b">${applyTier(passiveT(x),curTier)}</div>
  </div>`;
 const sel=document.getElementById('tierSel');if(sel)sel.onchange=e=>{curTier=+e.target.value;renderDetail();};
 document.querySelectorAll('.mlangs button').forEach(b=>b.onclick=()=>{lang=b.dataset.ml;document.querySelectorAll('.langs button').forEach(x=>x.classList.toggle('on',x.dataset.l==lang));applyLang();buildFilters();render();renderDetail();});}
document.querySelectorAll('.langs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.langs button').forEach(x=>x.classList.remove('on'));b.classList.add('on');lang=b.dataset.l;applyLang();buildFilters();render();if(curImg)renderDetail();});
document.getElementById('q').oninput=e=>{F.q=e.target.value;render()};
document.getElementById('frar').onchange=e=>{F.rar=e.target.value;render()};
document.getElementById('fsea').onchange=e=>{F.sea=e.target.value;render()};
document.getElementById('overlay').onclick=e=>{if(e.target.id=='overlay')closeDetail()};
document.addEventListener('keydown',e=>{if(e.key=='Escape')closeDetail()});
applyLang();buildFilters();render();
</script></body></html>
